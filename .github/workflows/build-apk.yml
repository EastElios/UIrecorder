name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          set -e
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "SDK root: $ANDROID_SDK_ROOT"
          
          # Check if sdkmanager exists
          if [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          else
            echo "Installing cmdline-tools..."
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            unzip -qo /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
            mv /tmp/cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          
          echo "Accepting licenses..."
          yes | $SDKMANAGER --licenses
          
          echo "Installing SDK packages..."
          $SDKMANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "SDK setup complete"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MacroRecorder-debug
          path: app/build/outputs/apk/debug/app-debug.apk