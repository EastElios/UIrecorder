name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check SDK and install missing components
        run: |
          set -e
          echo "=== SDK Info ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_SDK_ROOT" 2>/dev/null || echo "SDK dir not found"
          ls "$ANDROID_SDK_ROOT/platforms" 2>/dev/null || echo "No platforms"
          ls "$ANDROID_SDK_ROOT/build-tools" 2>/dev/null || echo "No build-tools"

          # Find sdkmanager anywhere
          SDKMANAGER=$(find / -path "*/cmdline-tools/*/bin/sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "Downloading cmdline-tools..."
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/sdk.zip
            unzip -qo /tmp/sdk.zip -d /tmp/sdk
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            cp -r /tmp/sdk/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi

          echo "sdkmanager: $SDKMANAGER"
          yes | $SDKMANAGER --licenses
          $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Build Debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MacroRecorder-debug
          path: app/build/outputs/apk/debug/app-debug.apk