name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "=== Checking existing SDK ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_SDK_ROOT/ || true
          ls -la $ANDROID_SDK_ROOT/platforms/ || true
          ls -la $ANDROID_SDK_ROOT/build-tools/ || true
          
          echo "=== Installing SDK components ==="
          SDKMANAGER=$(find $ANDROID_SDK_ROOT/cmdline-tools -name sdkmanager -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMANAGER"
          
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses
            $SDKMANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          else
            echo "sdkmanager not found, downloading cmdline-tools..."
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            unzip -qo /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            mv /tmp/cmdline-tools-tmp/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
            SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
            yes | $SDKMANAGER --licenses
            $SDKMANAGER "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          fi
          
          echo "=== Verify installation ==="
          ls -la $ANDROID_SDK_ROOT/platforms/
          ls -la $ANDROID_SDK_ROOT/build-tools/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MacroRecorder-debug
          path: app/build/outputs/apk/debug/app-debug.apk